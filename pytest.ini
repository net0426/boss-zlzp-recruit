# ===========================================
# Pytest 配置文件
# ===========================================
# 项目：招聘岗位智能筛选系统
# ===========================================

[pytest]
# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记定义
markers =
    slow: 慢速测试
    integration: 集成测试
    unit: 单元测试

# 最小版本
minversion = 6.0

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

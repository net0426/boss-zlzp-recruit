name: CI Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: 测试和代码检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint pytest pytest-cov

      - name: 运行导入测试
        run: python test_imports.py

      - name: 运行代码检查 (Pylint)
        run: |
          pylint pages/ business/ config/ utils/ main.py recruitment_greeting_sender.py --output-format=text --exit-zero || true

      - name: 检查代码格式
        run: |
          pip install black
          black --check pages/ business/ config/ utils/ main.py recruitment_greeting_sender.py || true

  lint:
    name: 代码风格检查
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy

      - name: 运行 flake8 检查
        run: |
          flake8 pages/ business/ config/ utils/ main.py recruitment_greeting_sender.py \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            || true

      - name: 运行 mypy 类型检查
        run: |
          mypy pages/ business/ config/ utils/ --ignore-missing-imports || true
